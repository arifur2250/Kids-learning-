<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Numbers Learning</title>

<style>

body{
font-family:Arial;
margin:0;
background:#e3f2fd;
text-align:center;
}

/* 🔙 Back Button */
.homeBtn{
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
font-size:16px;
cursor:pointer;
box-shadow:0 2px 5px rgba(0,0,0,0.3);
z-index:1000;
}

header{
background:#ff5722;
color:white;
padding:15px;
font-size:40px;
}

.controls{
background:white;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.number{
background:#2196f3;
color:white;
padding:18px;
border-radius:15px;
cursor:pointer;
font-size:100px;
transition:0.3s;
}

.number:hover{
background:#ff9800;
transform:scale(1.1);
}

.bounce{
animation:bounce 0.4s;
}

@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.quizBox{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.quizOptions button{
background:#03a9f4;
color:white;
border:none;
border-radius:8px;
padding:10px;
margin:5px;
cursor:pointer;
}

#result{
font-size:18px;
margin-top:10px;
}

</style>

</head>

<body>

<!-- 🏠 Back Button -->
<button class="homeBtn" onclick="goHome()">🏠 Home</button>

<header>
🔢 Numbers 1-100
</header>

<div class="controls">
Volume
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">
<button onclick="replay()">🔁 Replay</button>
</div>

<div class="grid" id="numbers"></div>

<!-- Quiz -->
<div class="quizBox">
<h3>🧠 Smart Quiz</h3>
<p id="question"></p>

<div class="quizOptions" id="options"></div>

<p id="result"></p>
</div>

<script>

let grid=document.getElementById("numbers");
let volume=document.getElementById("volume");

let lastNumber=null;

// 🔊 Voice
function speak(text){
let msg = new SpeechSynthesisUtterance(text);
msg.lang = "en-US";
msg.volume = volume.value;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// 🔢 Numbers create
for(let i=1;i<=100;i++){

let div=document.createElement("div");
div.className="number";
div.innerText=i;

div.onclick=function(){

lastNumber=i;
div.classList.add("bounce");

speak(i);

setTimeout(()=>div.classList.remove("bounce"),400);

};

grid.appendChild(div);

}

// 🔁 Replay
function replay(){
if(lastNumber){
speak(lastNumber);
}
}

// 🏠 Back to Home
function goHome(){
window.location.href="index.html";
}

//////////////////////////////////////////////////
// 🧠 SMART QUIZ

let correct;

function newQuiz(){

let q = Math.floor(Math.random()*10)+1;
correct = q;

document.getElementById("question").innerText = "Find number: " + q;
document.getElementById("result").innerText = "";

// 🔊 Voice Question
speak(q);

// options generate
let optionsDiv = document.getElementById("options");
optionsDiv.innerHTML="";

let options = [q, q+1, q-1];
options = options.sort(()=>0.5-Math.random());

options.forEach(opt=>{
  if(opt < 1) return;

  let btn = document.createElement("button");
  btn.innerText = opt;

  btn.onclick = function(){
    checkAns(opt);
  }

  optionsDiv.appendChild(btn);
});

}

function checkAns(ans){

if(ans == correct){
document.getElementById("result").innerText="✅ Correct!";
speak("Correct");
}else{
document.getElementById("result").innerText="❌ Wrong! Answer: " + correct;
speak("Wrong");
}

setTimeout(newQuiz,1200);

}

// start
newQuiz();

</script>

</body>
</html>
