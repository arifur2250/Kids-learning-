<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alphabet Learning</title>

<style>

body{
font-family:Arial;
margin:0;
background:#fce4ec;
text-align:center;
}

/* 🏠 Home Button */
.homeBtn{
position:fixed;
top:10px;
left:10px;
background:#e91e63;
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
}

header{
background:#e91e63;
color:white;
padding:15px;
font-size:24px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.card{
background:#ff4081;
color:white;
padding:25px;
border-radius:15px;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.1);
background:#ff9800;
}

.letter{
font-size:80px;
font-weight:bold;
}

.bounce{
animation:bounce 0.4s;
}

@keyframes bounce{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.quiz{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
}

.quiz button{
background:#03a9f4;
color:white;
border:none;
border-radius:8px;
padding:10px;
}

</style>

</head>

<body>

<!-- 🏠 Back Button -->
<button class="homeBtn" onclick="goHome()">🏠 Home</button>

<header>
🔤 Alphabet Learning
</header>

<div class="grid" id="alphabet"></div>

<!-- Quiz -->
<div class="quiz">
<h3>🧠 Alphabet Quiz</h3>
<p id="q"></p>

<div id="options"></div>

<p id="res"></p>
</div>

<script>

// 🏠 Back
function goHome(){
  window.location.href="index.html";
}

// 🔊 Voice
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// Data
let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

let grid=document.getElementById("alphabet");

// Create Alphabet (ONLY LETTER)
for(let i=0;i<26;i++){

let div=document.createElement("div");
div.className="card";

div.innerHTML=
'<div class="letter">'+letters[i]+'</div>';

div.onclick=function(){

div.classList.add("bounce");

// 🔊 শুধু letter বলবে
speak(letters[i]);

setTimeout(()=>div.classList.remove("bounce"),400);

};

grid.appendChild(div);

}

//////////////////////////////////////////////////
// 🧠 QUIZ

let current;

function newQ(){

let i=Math.floor(Math.random()*26);
current=letters[i];

document.getElementById("q").innerText=
"Select: " + current;

speak(current);

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

// options generate
let opts=[current,
letters[(i+1)%26],
letters[(i+2)%26]];

opts=opts.sort(()=>0.5-Math.random());

opts.forEach(o=>{
let btn=document.createElement("button");
btn.innerText=o;

btn.onclick=function(){
check(o);
};

optionsDiv.appendChild(btn);
});

document.getElementById("res").innerText="";
}

function check(ans){

if(ans===current){
document.getElementById("res").innerText="✅ Correct";
speak("Correct");
}else{
document.getElementById("res").innerText="❌ Wrong";
speak("Wrong");
}

setTimeout(newQ,1200);
}

// start
newQ();

</script>

</body>
</html>
