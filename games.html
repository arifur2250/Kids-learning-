<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Game Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff3e0;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* Header */
header{
background:#ff9800;
color:white;
padding:10px;
text-align:center;
font-size:20px;
}

/* Top bar */
.top{
display:flex;
justify-content:space-between;
padding:8px;
}

/* Mode buttons */
.modes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;
padding:8px;
}

.mode{
background:#ff5722;
color:white;
padding:8px;
border-radius:8px;
text-align:center;
font-size:14px;
}

/* Info */
.info{
text-align:center;
font-size:14px;
}

/* Game area */
#game{
flex:1;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:8px;
}

/* Card */
.card{
background:#ff5722;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
border-radius:10px;
height:100%;
}

.open{background:#4caf50;}
.matched{background:#9e9e9e;}

button{
border:none;
padding:6px 10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>🧠 Memory Game Pro</header>

<div class="top">
<button onclick="startGame()">▶ Start</button>
<button onclick="restartGame()">🔄 Restart</button>
</div>

<div class="modes">
<div class="mode" onclick="setMode('number')">🔢 Number</div>
<div class="mode" onclick="setMode('alphabet')">🔤 ABC</div>
<div class="mode" onclick="setMode('bangla')">🇧🇩 বাংলা</div>
</div>

<div class="info">
⏱️ <span id="time">0</span> sec | ⭐ <span id="score">0</span>
</div>

<div id="game"></div>

<script>

let mode="number";
let items=[];
let first=null, second=null;
let lock=false;
let score=0, time=0;
let timer;
let started=false;

const game=document.getElementById("game");

/* Modes */
function setMode(m){
mode=m;
restartGame();
}

/* Data */
function getData(){

if(mode==="number"){
return [1,2,3,4,5,6,7,8];
}

if(mode==="alphabet"){
return ["A","B","C","D","E","F","G","H"];
}

if(mode==="bangla"){
return ["অ","আ","ই","ঈ","উ","ঊ","এ","ঐ"];
}

}

/* Shuffle */
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

/* Start */
function startGame(){

started=true;

let base=getData();
items=[...base,...base];

shuffle(items);

score=0;
time=0;

document.getElementById("score").innerText=0;
document.getElementById("time").innerText=0;

clearInterval(timer);

timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);

createBoard();
}

/* Restart */
function restartGame(){
startGame();
}

/* Board */
function createBoard(){

game.innerHTML="";

items.forEach(val=>{

let div=document.createElement("div");
div.className="card";
div.dataset.value=val;

div.onclick=function(){

if(!started || lock || div.classList.contains("matched") || div===first) return;

div.innerText=val;
div.classList.add("open");

if(!first){
first=div;
}else{
second=div;
lock=true;

if(first.dataset.value===second.dataset.value){

first.classList.add("matched");
second.classList.add("matched");

score++;
document.getElementById("score").innerText=score;

reset();

/* Win */
if(score===items.length/2){
clearInterval(timer);
setTimeout(()=>alert("🎉 তুমি জিতেছো!"),300);
}

}else{

setTimeout(()=>{
first.innerText="";
second.innerText="";
first.classList.remove("open");
second.classList.remove("open");
reset();
},600);

}

}

};

game.appendChild(div);

});

}

/* Reset */
function reset(){
first=null;
second=null;
lock=false;
}

</script>

</body>
</html>
