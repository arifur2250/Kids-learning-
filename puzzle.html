<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Puzzle - Final Pro</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#e3f2fd;
text-align:center;
}

header{
background:#2196f3;
color:white;
padding:10px 15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.home-btn{
background:#4caf50;
padding:6px 12px;
border-radius:8px;
color:white;
text-decoration:none;
}

.top-buttons{
background:#e3f2fd;
display:flex;
flex-wrap:wrap;
gap:10px;
padding:10px;
justify-content:center;
position:sticky;
top:0;
z-index:10;
}

.top-buttons button{
flex:1 1 120px;
max-width:140px;
height:40px;
border:none;
border-radius:8px;
background:#ff9800;
color:white;
font-size:13px;
}

.info-bar{
background:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:8px 15px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
font-weight:bold;
position:sticky;
top:60px;
z-index:9;
}

#levelProgress{ color:#2196f3; }
#timer{ color:#ff5722; }

.game-area{
padding:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

.box{
background:#4caf50;
color:white;
height:80px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
font-size:clamp(16px,5vw,22px);
cursor:pointer;
transition:0.2s;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

.win{
animation:pop 0.5s ease;
color:#ff5722;
font-size:24px;
}

#result{
margin:10px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
🎮 Kids Puzzle
<a href="index.html" class="home-btn">🏠</a>
</header>

<div class="top-buttons">
<button onclick="startLevel('num')">Numbers</button>
<button onclick="startLevel('alphabet')">Alphabet</button>
<button onclick="startLevel('bn_vowel')">স্বরবর্ণ</button>
<button onclick="startLevel('bn_consonant')">ব্যঞ্জনবর্ণ</button>
<button onclick="startLevel('en_month')">Eng Month</button>
<button onclick="startLevel('bn_month')">বাংলা মাস</button>
<button onclick="startLevel('en_day')">Eng Day</button>
<button onclick="startLevel('bn_day')">বাংলা দিন</button>
</div>

<div class="info-bar">
<div id="levelProgress">Loading...</div>
<div id="timer">Time: 0s</div>
</div>

<div class="game-area">
<div class="grid" id="gameGrid"></div>
<div id="result"></div>
</div>

<script>

/* 🔊 SOUND */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, duration){
let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();
osc.connect(gain);
gain.connect(audioCtx.destination);
osc.frequency.value = freq;
osc.start();
gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
osc.stop(audioCtx.currentTime + duration);
}

function playSound(type){
if(type==="wrong") beep(150,0.5);
if(type==="win"){
beep(700,0.2);
setTimeout(()=>beep(900,0.2),150);
setTimeout(()=>beep(1100,0.3),300);
}
}

document.body.addEventListener("click", () => {
if(audioCtx.state==="suspended") audioCtx.resume();
}, {once:true});

/* 🔊 FINAL VOICE FIX */
function speak(text){

// ❌ voice OFF for letters
if(currentCategory==="bn_vowel" || currentCategory==="bn_consonant") return;

let u = new SpeechSynthesisUtterance(text);

if(currentCategory==="bn_month" || currentCategory==="bn_day"){

let voices = speechSynthesis.getVoices();

// ✅ Only Bangla allowed
let voiceBD = voices.find(v => v.lang === "bn-BD");
let voiceBN = voices.find(v => v.lang.startsWith("bn"));

if(voiceBD){
u.voice = voiceBD;
}
else if(voiceBN){
u.voice = voiceBN;
}
else{
return; // ❌ No Bangla → no sound
}

}else{
u.lang = "en-US";
}

speechSynthesis.cancel();
speechSynthesis.speak(u);
}

/* GAME */

function getCategoryName(cat){
return {
num:"Numbers",
alphabet:"Alphabet",
bn_vowel:"স্বরবর্ণ",
bn_consonant:"ব্যঞ্জনবর্ণ",
en_month:"English Month",
bn_month:"বাংলা মাস",
en_day:"English Day",
bn_day:"বাংলা দিন"
}[cat];
}

function chunkArray(arr,size){
let res=[];
for(let i=0;i<arr.length;i+=size){
res.push(arr.slice(i,i+size));
}
return res;
}

let numbers=[...Array(100)].map((_,i)=>(i+1).toString());
let alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

let bn_vowel=["অ","আ","ই","ঈ","উ","ঊ","ঋ","এ","ঐ","ও","ঔ"];
let bn_consonant=["ক","খ","গ","ঘ","ঙ","চ","ছ","জ","ঝ","ঞ","ট","ঠ","ড","ঢ","ণ","ত","থ","দ","ধ","ন","প","ফ","ব","ভ","ম","য","র","ল","শ","ষ","স","হ"];

let en_month=["January","February","March","April","May","June","July","August","September","October","November","December"];
let bn_month=["বৈশাখ","জ্যৈষ্ঠ","আষাঢ়","শ্রাবণ","ভাদ্র","আশ্বিন","কার্তিক","অগ্রহায়ণ","পৌষ","মাঘ","ফাল্গুন","চৈত্র"];

let en_day=["Saturday","Sunday","Monday","Tuesday","Wednesday","Thursday","Friday"];
let bn_day=["শনিবার","রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার"];

const levels={
num:chunkArray(numbers,16),
alphabet:chunkArray(alphabet,16),
bn_vowel:chunkArray(bn_vowel,16),
bn_consonant:chunkArray(bn_consonant,16),
en_month:chunkArray(en_month,16),
bn_month:chunkArray(bn_month,16),
en_day:chunkArray(en_day,16),
bn_day:chunkArray(bn_day,16)
};

let currentCategory="",currentLevel=0,currentList=[],currentStep=0;
let startTime=0,timerInterval;

function startTimer(){
startTime=Date.now();
clearInterval(timerInterval);
timerInterval=setInterval(()=>{
timer.innerText="Time: "+Math.floor((Date.now()-startTime)/1000)+"s";
},1000);
}

function startLevel(cat,lvl=0){
currentCategory=cat;
currentLevel=lvl;
currentList=levels[cat][lvl];
currentStep=0;

gameGrid.innerHTML="";
result.innerText="";

levelProgress.innerText=getCategoryName(cat)+" | Level "+(lvl+1)+" / "+levels[cat].length;

startTimer();

currentList.slice().sort(()=>Math.random()-0.5).forEach(item=>{
let div=document.createElement("div");
div.className="box";
div.innerText=item;

div.onclick=()=>{
speak(item);
check(div,item);
};

gameGrid.appendChild(div);
});
}

function showWin(){
result.innerText="🎉 Level "+(currentLevel+1)+" Complete!";
result.className="win";
playSound("win");
}

function check(el,val){
if(val===currentList[currentStep]){
gameGrid.insertBefore(el, gameGrid.children[currentStep]);
el.style.background="green";
currentStep++;

if(currentStep===currentList.length){
showWin();
if(currentLevel<levels[currentCategory].length-1){
setTimeout(()=>startLevel(currentCategory,currentLevel+1),1500);
}else{
clearInterval(timerInterval);
result.innerText="🏆 All Completed!";
}
}
}else{
playSound("wrong");
el.style.background="red";
setTimeout(()=>startLevel(currentCategory,currentLevel),500);
}
}

window.onload=()=>startLevel("num");

</script>

</body>
</html>
