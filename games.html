<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Game Pro</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff3e0;
display:flex;
flex-direction:column;
height:100vh;
overflow:hidden;
}

/* Home */
.homeBtn{
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
z-index:10;
}

/* Header */
header{
background:#ff9800;
color:white;
padding:12px;
text-align:center;
font-size:18px;
}

/* Top */
.top{
display:flex;
gap:10px;
padding:10px;
}
.top button{
flex:1;
height:40px;
}

/* Modes */
.modes{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:0 10px 10px;
}
.mode{
background:#ff5722;
color:white;
height:40px;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
}

/* Info */
.info{
text-align:center;
font-size:14px;
margin-bottom:5px;
}

/* Center */
.gameWrapper{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:10px;
}

/* Game box */
#game{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
width:100%;
max-width:360px;
padding:12px;
background:#fff8f0;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

/* Card */
.card{
background:#ff5722;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:26px;
border-radius:12px;
aspect-ratio:1/1;
cursor:pointer;
transition:all 0.25s ease;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* Tap */
.card:active{
transform:scale(0.92);
}

/* Open animation */
.open{
background:#4caf50;
transform:scale(1.08);
box-shadow:0 0 15px rgba(76,175,80,0.6);
}

/* Match animation */
.matched{
background:#9e9e9e;
animation:bounceGlow 0.5s ease;
box-shadow:0 0 20px rgba(255,255,255,0.6);
}

@keyframes bounceGlow{
0%{transform:scale(1);}
40%{transform:scale(1.2);}
70%{transform:scale(0.95);}
100%{transform:scale(1);}
}

button{
border:none;
border-radius:8px;
}

</style>

</head>

<body>

<button class="homeBtn" onclick="goHome()">🏠</button>

<header>🧠 Memory Game</header>

<div class="top">
<button onclick="startGame()">▶ Start</button>
<button onclick="restartGame()">🔄 Restart</button>
</div>

<div class="modes">
<div class="mode" onclick="setMode('number')">🔢</div>
<div class="mode" onclick="setMode('alphabet')">🔤</div>
<div class="mode" onclick="setMode('bangla')">🇧🇩</div>
</div>

<div class="info">
⏱️ <span id="time">0</span> | ⭐ <span id="score">0</span>
</div>

<div class="gameWrapper">
  <div id="game"></div>
</div>

<script>

function goHome(){
window.location.href="index.html";
}

let mode="number";
let items=[];
let first=null, second=null;
let lock=false;
let score=0, time=0;
let timer;
let started=false;

const game=document.getElementById("game");

/* Sounds */
const correctSound=new Audio("https://cdn.pixabay.com/download/audio/2023/03/25/audio_6c9b1a.mp3");
const wrongSound=new Audio("https://cdn.pixabay.com/download/audio/2022/10/16/audio_12f6b1.mp3");
const clickSound=new Audio("https://cdn.pixabay.com/download/audio/2022/03/15/audio_3e3b7c.mp3");

/* Mode */
function setMode(m){
mode=m;
restartGame();
}

/* Data */
function getData(){
if(mode==="number") return [1,2,3,4,5,6,7,8];
if(mode==="alphabet") return ["A","B","C","D","E","F","G","H"];
if(mode==="bangla") return ["অ","আ","ই","ঈ","উ","ঊ","এ","ঐ"];
}

/* Shuffle */
function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

/* Start */
function startGame(){

started=true;

let base=getData();
items=[...base,...base];
shuffle(items);

score=0;
time=0;

document.getElementById("score").innerText=0;
document.getElementById("time").innerText=0;

clearInterval(timer);

timer=setInterval(()=>{
time++;
document.getElementById("time").innerText=time;
},1000);

createBoard();
}

/* Restart */
function restartGame(){
startGame();
}

/* Board */
function createBoard(){

game.innerHTML="";

items.forEach(val=>{

let div=document.createElement("div");
div.className="card";
div.dataset.value=val;

div.onclick=function(){

if(!started || lock || div.classList.contains("matched") || div===first) return;

clickSound.currentTime=0;
clickSound.play();

div.innerText=val;
div.classList.add("open");

if(!first){
first=div;
}else{
second=div;
lock=true;

if(first.dataset.value===second.dataset.value){

correctSound.currentTime=0;
correctSound.play();

first.classList.add("matched");
second.classList.add("matched");

score++;
document.getElementById("score").innerText=score;

reset();

if(score===8){
clearInterval(timer);
setTimeout(()=>alert("🎉 তুমি জিতেছো!"),300);
}

}else{

wrongSound.currentTime=0;
wrongSound.play();

setTimeout(()=>{
first.innerText="";
second.innerText="";
first.classList.remove("open");
second.classList.remove("open");
reset();
},600);

}

}

};

game.appendChild(div);

});

}

/* Reset */
function reset(){
first=null;
second=null;
lock=false;
}

</script>

</body>
</html>
