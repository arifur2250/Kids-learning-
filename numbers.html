<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Numbers Learning</title>

<style>

body{
font-family:Arial;
margin:0;
background:#e3f2fd;
text-align:center;
overflow:hidden;
height:100vh;
display:flex;
flex-direction:column;
}

/* 🔙 Back Button */
.homeBtn{
position:fixed;
top:10px;
left:10px;
background:#ff5722;
color:white;
border:none;
padding:8px 12px;
border-radius:10px;
font-size:14px;
z-index:1000;
}

/* Header */
header{
background:#ff5722;
color:white;
padding:10px;
font-size:clamp(20px,5vw,40px);
}

/* Controls */
.controls{
background:white;
padding:8px;
}

/* 🔥 GRID SMALLER */
.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;

/* ✅ reduce height */
height:35vh;
overflow:auto;
}

/* 🔢 Number Button BIGGER */
.number{
background:#2196f3;
color:white;
padding:18px;
border-radius:15px;
cursor:pointer;
font-size:clamp(20px,5vw,42px);
}

/* 🔥 Animation */
.bounce{
animation:superBounce 0.6s;
}

@keyframes superBounce{
0%{transform:scale(1);}
30%{transform:scale(1.5) rotate(5deg); box-shadow:0 0 15px #ffeb3b;}
60%{transform:scale(0.85) rotate(-5deg); box-shadow:0 0 25px #ff9800;}
100%{transform:scale(1);}
}

/* 🧠 QUIZ (FIXED HEIGHT) */
.quizBox{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

/* Effects */
.correctFlash{
animation:flashGreen 0.5s;
}
@keyframes flashGreen{
0%{background:#c8e6c9;}
100%{background:white;}
}

.wrongShake{
animation:shake 0.4s;
}
@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

/* 🔘 BIG QUIZ BUTTONS */
.quizOptions{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.quizOptions button{
background:#03a9f4;
color:white;
border:none;
border-radius:10px;
padding:15px;
font-size:20px;
}

/* Result */
#result{
font-size:20px;
margin-top:10px;
font-weight:bold;
}

</style>
</head>

<body>

<button class="homeBtn" onclick="goHome()">🏠 Home</button>

<header>🔢 Numbers 1-100</header>

<div class="controls">
Volume
<input type="range" id="volume" min="0" max="1" step="0.1" value="1">
<button onclick="replay()">🔁 Replay</button>
</div>

<div class="grid" id="numbers"></div>

<!-- 🧠 QUIZ -->
<div class="quizBox" id="quizBox">
<h3>🧠 Exam Mode</h3>
<p id="question"></p>

<div class="quizOptions" id="options"></div>

<p id="result"></p>
<p id="score"></p>
</div>

<audio id="correctSound" src="correct.mp3"></audio>
<audio id="wrongSound" src="wrong.mp3"></audio>

<script>

let grid=document.getElementById("numbers");
let volume=document.getElementById("volume");
let quizBox=document.getElementById("quizBox");

let lastNumber=null;

// 🔊 Voice
function speak(text){
let msg=new SpeechSynthesisUtterance(text);
msg.lang="en-US";
msg.volume=volume.value;
speechSynthesis.cancel();
speechSynthesis.speak(msg);
}

// 🔊 Sound
function playSound(type){
let sound=document.getElementById(type+"Sound");
if(sound){
sound.currentTime=0;
sound.play();
}
}

// 🔢 Numbers
for(let i=1;i<=100;i++){
let div=document.createElement("div");
div.className="number";
div.innerText=i;

div.onclick=function(){
lastNumber=i;
div.classList.add("bounce");
speak(i);
setTimeout(()=>div.classList.remove("bounce"),600);
};

grid.appendChild(div);
}

// 🔁 Replay
function replay(){
if(lastNumber){
speak(lastNumber);
}
}

// 🏠 Home
function goHome(){
window.location.href="index.html";
}

//////////////////////////////////////////////////
// 🧠 QUIZ

let correct;
let questionCount=0;
let score=0;
let total=10;

function newQuiz(){

if(questionCount>=total){
endExam();
return;
}

questionCount++;

let q=Math.floor(Math.random()*100)+1;
correct=q;

document.getElementById("question").innerText=
"Q"+questionCount+": Find "+q;

document.getElementById("result").innerText="";
document.getElementById("score").innerText=
"Score: "+score+" / "+total;

speak(q);

// options
let options=[q];
while(options.length<4){
let n=Math.floor(Math.random()*100)+1;
if(!options.includes(n)) options.push(n);
}
options=options.sort(()=>Math.random()-0.5);

let optionsDiv=document.getElementById("options");
optionsDiv.innerHTML="";

options.forEach(opt=>{
let btn=document.createElement("button");
btn.innerText=opt;

btn.onclick=function(){
checkAns(opt);
};

optionsDiv.appendChild(btn);
});
}

function checkAns(ans){

if(ans==correct){

score++;
document.getElementById("result").innerText="✅ Correct!";
playSound("correct");
speak("Correct");

quizBox.classList.add("correctFlash");
setTimeout(()=>quizBox.classList.remove("correctFlash"),500);

setTimeout(newQuiz,800);

}else{

document.getElementById("result").innerText="❌ Try Again!";
playSound("wrong");
speak("Wrong");

quizBox.classList.add("wrongShake");
setTimeout(()=>quizBox.classList.remove("wrongShake"),400);
}

}

function endExam(){

document.getElementById("question").innerText="🎉 Finished!";
document.getElementById("options").innerHTML="";

let msg="";
if(score>=8) msg="🌟 Excellent!";
else if(score>=5) msg="👍 Good!";
else msg="📚 Practice More!";

document.getElementById("result").innerText=
"Final Score: "+score+" / "+total+" "+msg;

}

newQuiz();

</script>

</body>
</html>
